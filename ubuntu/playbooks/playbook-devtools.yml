---
- hosts: all
  become: true
  vars:
    target_user: shawon

  tasks:
    - name: Install system development packages
      apt:
        name:
          - git
          - clang
          - llvm
          - make
          - curl
          - libssl-dev
          - zlib1g-dev
          - libbz2-dev
          - libreadline-dev
          - libsqlite3-dev
          - libncurses5-dev
          - libncursesw5-dev
          - xz-utils
          - tk-dev
          - libffi-dev
          - patch
          - python3-dev
          - python3-pip
          - zsh
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: Install Podman and Podman Compose
      apt:
        name:
          - podman
          - podman-compose
        state: present

    - name: Add GitHub CLI repository
      shell:
        cmd: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt update
        creates: /etc/apt/sources.list.d/github-cli.list

    - name: Install gh cli
      apt:
        name: gh
        state: present

    - name: Add Microsoft GPG key for VSCode
      apt_key:
        url: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Add VSCode repository
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/ubuntu/$(lsb_release -rs)/prod jammy main"
        state: present
        filename: vscode
        update_cache: yes

    - name: Install VSCode
      apt:
        name: code
        state: present

    - name: Install Node.js and npm
      apt:
        name:
          - nodejs
          - npm
        state: present

    - name: Install corepack
      command: npm i -g corepack

- hosts: all
  become: false
  vars:
    target_user: shawon
  tasks:
    - name: Enable corepack
      command: corepack enable

    - name: Install Rust and Cargo
      shell:
        cmd: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
        creates: "/home/{{ target_user }}/.cargo/bin/rustc"

    - name: Install pyenv
      shell:
        cmd: |
          curl https://pyenv.run | bash
        creates: "/home/{{ target_user }}/.pyenv/bin/pyenv"

    - name: Configure shell for pyenv
      blockinfile:
        path: "/home/{{ target_user }}/.bashrc"
        block: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          export PATH="$HOME/.cargo/bin:$PATH"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - dev tools"
        create: true

    - name: Install uv (Python package manager)
      shell:
        cmd: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
        creates: "/home/{{ target_user }}/.local/bin/uv"
