---
- hosts: all
  become: true
  tasks:
    - name: Install Ubuntu restricted extras (multimedia codecs)
      apt:
        name: ubuntu-restricted-extras
        state: present

    - name: Install additional multimedia codecs
      apt:
        name:
          - gstreamer1.0-plugins-base-apps
          - gstreamer1.0-plugins-base
          - gstreamer1.0-plugins-good
          - gstreamer1.0-plugins-bad
          - gstreamer1.0-plugins-ugly
          - gstreamer1.0-libav
          - gstreamer1.0-doc
          - gstreamer1.0-tools
          - libavcodec-extra
        state: present

    - name: Install VLC
      apt:
        name: vlc
        state: present

    - name: Install MPV
      apt:
        name: mpv
        state: present

    - name: Install Handbrake
      apt:
        name: handbrake
        state: present

    # Note: handbrake-gui is included in the handbrake package on Ubuntu
