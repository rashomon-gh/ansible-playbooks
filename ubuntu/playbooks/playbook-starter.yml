---
- hosts: all
  become: true
  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade system
      apt:
        upgrade: dist
        update_cache: yes

    - name: Install essential packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
          - python3-pip
          - python3-apt
        state: present

    - name: Ensure universe repository is enabled
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_distribution_release }} universe"
        state: present
        update_cache: yes

    - name: Ensure multiverse repository is enabled
      apt_repository:
        repo: "deb http://archive.ubuntu.com/ubuntu/ {{ ansible_distribution_release }} multiverse"
        state: present
        update_cache: yes

  tasks:
    - name: Add TLP repository (Linux Advanced Power Management)
      apt_repository:
        repo: "ppa:linrunner/tlp"
        state: present
        update_cache: yes
      # Note: TLP has an official PPA for Ubuntu with regular updates
