---
- hosts: all
  become: true
  tasks:
    - name: Enable 32-bit architecture (required for Steam)
      shell:
        cmd: dpkg --add-architecture i386
        creates: /var/lib/dpkg/arch
      # Note: This command adds i386 architecture support needed for Steam

    - name: Update apt cache after adding i386 architecture
      apt:
        update_cache: yes

    - name: Install Steam
      apt:
        name:
          - steam-installer
        state: present

    - name: Add Lutris PPA
      apt_repository:
        repo: ppa:lutris-team/lutris
        state: present
        update_cache: yes

    - name: Install Lutris
      apt:
        name: lutris
        state: present

    - name: Add MangoHud PPA
      apt_repository:
        repo: ppa:flexiondotorg/mangohud
        state: present
        update_cache: yes

    - name: Install MangoHud
      apt:
        name: mangohud
        state: present

    # Note: vkBasalt may not be available in Ubuntu repos
    # Install via: flatpak install flathub com.valvesoftware.Steam.Utility.vkBasalt

    - name: Install GameMode
      apt:
        name: gamemode
        state: present

    # Note: steam-devices is not available on Ubuntu
    # Device support is typically included in the main steam package
