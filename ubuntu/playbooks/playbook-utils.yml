---
- hosts: all
  become: true
  tasks:
    - name: Install htop, btop
      apt:
        name:
          - htop
          - btop
        state: present

    - name: Install wl-clipboard (Wayland clipboard utilities)
      apt:
        name:
          - wl-clipboard
        state: present

    - name: Install tree
      apt:
        name: tree
        state: present

    - name: Install fastfetch
      apt:
        name: fastfetch
        state: present

    # Note: onefetch is not available in standard Ubuntu repos
    # Install via cargo: cargo install onefetch
    - name: Install onefetch via cargo (if rust is installed)
      shell: cargo install onefetch
      args:
        creates: /usr/local/cargo/bin/onefetch
      ignore_errors: true
      # Silently fail if rust/cargo is not installed yet

    - name: Install wget
      apt:
        name: wget
        state: present

    # Note: bottles is primarily available via Flatpak on Ubuntu
    # Use: flatpak install flathub com.usebottles.bottles

    # Note: btrfs-assistant is not available in Ubuntu repos
    # Use btrfs-progs and snapper-tools instead

    - name: Install gparted
      apt:
        name: gparted
        state: present

    # Note: distrobox is available via Ubuntu repos
    - name: Install distrobox
      apt:
        name: distrobox
        state: present
