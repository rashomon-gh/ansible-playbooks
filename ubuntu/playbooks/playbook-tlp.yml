---
- hosts: all
  become: true
  tasks:
    - name: Install TLP and related packages
      apt:
        name:
          - tlp
          - tlp-rdw
        state: present
        update_cache: yes

    - name: Remove power-profiles-daemon (conflicts with TLP)
      apt:
        name:
          - power-profiles-daemon
        state: absent
        purge: yes

    - name: Enable and start TLP service
      systemd:
        name:
          - tlp.service
        enabled: true
        state: started

    - name: Mask systemd-rfkill services (conflict with TLP)
      systemd:
        name:
          - systemd-rfkill.service
          - systemd-rfkill.socket
        masked: true

    # Note: TLP on Ubuntu doesn't include tlp-pd (power management daemon)
    # as it uses the main tlp service for power management
