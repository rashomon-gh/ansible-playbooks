---
- hosts: all
  become: true
  tasks:
    - name: Install htop, btop
      zypper:
        name:
          - htop
          - btop
        state: present

    - name: Install wl-clipboard (Wayland clipboard utilities)
      zypper:
        name:
          - wl-clipboard
        state: present

    - name: Install tree
      zypper:
        name: tree
        state: present

    - name: Install fastfetch
      zypper:
        name: fastfetch
        state: present

    # Note: onefetch is not available in standard openSUSE repos
    # Install via cargo: cargo install onefetch
    - name: Install onefetch via cargo (if rust is installed)
      shell: cargo install onefetch
      args:
        creates: /root/.cargo/bin/onefetch
      ignore_errors: true
      # Silently fail if rust/cargo is not installed yet

    - name: Install wget
      zypper:
        name: wget
        state: present

    # Note: bottles is primarily available via Flatpak on openSUSE
    # Use: flatpak install flathub com.usebottles.bottles

    - name: Install gparted
      zypper:
        name: gparted
        state: present

    # Note: distrobox is available via openSUSE repos
    - name: Install distrobox
      zypper:
        name: distrobox
        state: present
