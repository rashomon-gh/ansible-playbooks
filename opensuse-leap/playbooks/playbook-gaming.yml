---
- hosts: all
  become: true
  tasks:
    # Note: Steam on openSUSE may require additional repositories
    # Check: https://en.opensuse.org/SDB:Steam

    - name: Add Games repository
      zypper_repository:
        name: games
        repo: 'https://download.opensuse.org/repositories/games/openSUSE_Leap_$releasever/'
        auto_import_keys: yes
        state: present
        runrefresh: yes

    - name: Install Steam
      zypper:
        name:
          - steam
        state: present

    # Note: Lutris may not be available in standard openSUSE repos
    # Consider using Flatpak: flatpak install flathub net.lutris.Lutris
    - name: Install Lutris (Flatpak alternative)
      shell:
        cmd: flatpak install flathub net.lutris.Lutris -y
        creates: /var/lib/flatpak/app/net.lutris.Lutris
      ignore_errors: true

    # Note: MangoHud may not be available in standard openSUSE repos
    # Consider using Flatpak or building from source
    - name: Install MangoHud (Flatpak alternative)
      shell:
        cmd: flatpak install flathub org.freedesktop.Platform.VulkanLayer.MangoHud -y
        creates: /var/lib/flatpak/app/org.freedesktop.Platform.VulkanLayer.MangoHud
      ignore_errors: true

    # Note: vkBasalt may not be available in openSUSE repos
    # Install via: flatpak install flathub com.valvesoftware.Steam.Utility.vkBasalt

    - name: Install GameMode
      zypper:
        name: gamemode
        state: present
      # Note: May require additional repositories
      ignore_errors: true

    # Note: steam-devices is not typically needed on openSUSE
    # Device support is usually included in the main steam package
