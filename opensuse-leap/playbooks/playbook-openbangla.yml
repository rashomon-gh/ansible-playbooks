---
- hosts: all
  become: true
  tasks:
    - name: Install ibus and dependencies
      zypper:
        name:
          - ibus
          - ibus-m17n
          - m17n-db
          - m17n-lib
        state: present

    - name: Install OpenBangla Keyboard
      shell: wget -q https://raw.githubusercontent.com/OpenBangla/OpenBangla-Keyboard/master/tools/install.sh -O - | bash
      args:
        creates: /usr/bin/openbangla-keyboard
        warn: false
      # Note: This installation script is designed for Fedora but may work on openSUSE
      # If it fails, consider using the Flatpak version or manual installation from:
      # https://github.com/OpenBangla/OpenBangla-Keyboard
      # openSUSE alternative: Use ibus-m17n for Bengali input support
