---
- hosts: all
  become: true
  pre_tasks:
    - name: Update zypper cache and system
      zypper:
        name: '*'
        state: present
        update_cache: yes

    - name: Distribute upgrade
      zypper:
        name: '*'
        state: dist-upgrade
        update_cache: yes

    - name: Install essential packages
      zypper:
        name:
          - curl
          - wget
          - gnupg
          - python3
          - python3-pip
          - python3-PyYAML
        state: present

  tasks:
    # Note: Packman repository for multimedia codecs on openSUSE
    - name: Add Packman repository (multimedia codecs)
      zypper_repository:
        name: packman
        repo: 'https://ftp.gwdg.de/pub/linux/misc/packman/suse/openSUSE_Leap_$releasever/'
        auto_import_keys: yes
        state: present
        runrefresh: yes

    - name: Switch multimedia packages to Packman versions
      shell:
        cmd: zypper dist-upgrade --from packman --allow-vendor-change
      # This switches packages to Packman versions for better codec support

    # Note: TLP is available in standard openSUSE repos
    # No additional repository needed
