---
- hosts: all
  become: true
  tasks:
    - name: Install multimedia codecs from Packman
      zypper:
        name:
          - gstreamer-plugins-base
          - gstreamer-plugins-good
          - gstreamer-plugins-bad
          - gstreamer-plugins-libav
          - gstreamer-plugins-ugly
          - libavcodec-full
          - ffmpeg
          - vlc-codecs
        state: present
        # Note: Packman repository should be added in playbook-starter.yml

    - name: Install VLC
      zypper:
        name: vlc
        state: present

    - name: Install MPV
      zypper:
        name: mpv
        state: present

    - name: Install Handbrake
      zypper:
        name: handbrake
        state: present

    # Note: handbrake-gui is included in the handbrake package on openSUSE
