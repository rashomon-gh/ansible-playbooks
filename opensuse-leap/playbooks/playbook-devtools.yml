---
- hosts: all
  become: true
  vars:
    target_user: shawon

  tasks:
    - name: Install system development packages
      zypper:
        name:
          - git
          - clang
          - llvm
          - make
          - curl
          - libopenssl-devel
          - zlib-devel
          - libbz2-devel
          - readline-devel
          - sqlite3-devel
          - ncurses-devel
          - xz-devel
          - tk-devel
          - libffi-devel
          - patch
          - python3-devel
          - python3-pip
          - zsh
        state: present

    # Note: Docker installation on openSUSE may require additional repositories
    # Check: https://en.opensuse.org/Docker
    - name: Add Virtualization repository
      zypper_repository:
        name: virtualization
        repo: 'https://download.opensuse.org/repositories/Virtualization/openSUSE_Leap_$releasever/'
        auto_import_keys: yes
        state: present
        runrefresh: yes

    - name: Install Docker
      zypper:
        name:
          - docker
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: true

    - name: Install Podman
      zypper:
        name:
          - podman
        state: present

    # Note: podman-compose may not be available in standard repos
    # Install via: pip install podman-compose

    - name: Install GitHub CLI
      zypper:
        name: gh
        state: present

    - name: Add VSCode repository
      zypper_repository:
        name: vscode
        repo: 'https://packages.microsoft.com/yumrepos/vscode/'
        auto_import_keys: yes
        state: present
        runrefresh: yes

    - name: Install VSCode
      zypper:
        name: code
        state: present

    - name: Install Node.js and npm
      zypper:
        name:
          - nodejs
          - npm
        state: present

    - name: Install corepack
      command: npm i -g corepack

- hosts: all
  become: false
  vars:
    target_user: shawon
  tasks:
    - name: Enable corepack
      command: corepack enable

    - name: Install Rust and Cargo
      shell:
        cmd: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
        creates: "/home/{{ target_user }}/.cargo/bin/rustc"

    - name: Install pyenv
      shell:
        cmd: |
          curl https://pyenv.run | bash
        creates: "/home/{{ target_user }}/.pyenv/bin/pyenv"

    - name: Configure shell for pyenv
      blockinfile:
        path: "/home/{{ target_user }}/.bashrc"
        block: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          export PATH="$HOME/.cargo/bin:$PATH"
        marker: "# {mark} ANSIBLE MANAGED BLOCK - dev tools"
        create: true

    - name: Install uv (Python package manager)
      shell:
        cmd: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
        creates: "/home/{{ target_user }}/.local/bin/uv"
